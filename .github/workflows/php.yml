name: PHP CI

on:
  push:
    branches: ["master", "main"]
  pull_request:
    branches: ["master", "main"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  workflow-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install actionlint
        run: |
          mkdir -p "$HOME/bin"
          curl -sSL https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash \
            | bash -s -- latest "$HOME/bin"
          echo "$HOME/bin" >> "$GITHUB_PATH"

      - name: Lint GitHub Actions workflows
        run: actionlint -color

  dependency-review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Dependency Review
        uses: actions/dependency-review-action@v4

  test:
    runs-on: ubuntu-latest
    env:
      YII_TEST_DB_DSN: mysql:host=127.0.0.1;port=3306;dbname=yii2test
      YII_TEST_DB_USERNAME: root
      YII_TEST_DB_PASSWORD: root
    strategy:
      fail-fast: false
      matrix:
        php: ["8.1", "8.3"]

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_DATABASE: yii2test
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd "mysqladmin ping -h 127.0.0.1 -uroot -proot --silent"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, pdo_mysql
          coverage: none
          tools: composer:v2

      - name: Validate composer files
        run: composer validate --strict

      - name: Allow Yii2 composer plugin
        run: composer config --no-plugins allow-plugins.yiisoft/yii2-composer true

      - name: Cache Composer cache
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache/files
          key: ${{ runner.os }}-php-${{ matrix.php }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-php-${{ matrix.php }}-composer-

      - name: Install dependencies
        run: |
          set -euo pipefail

          install_cmd="composer install --no-interaction --prefer-dist --no-progress"

          for attempt in 1 2 3; do
            echo "Попытка установки зависимостей: ${attempt}"
            if ${install_cmd}; then
              exit 0
            fi

            if [ "${attempt}" -eq 2 ]; then
              echo "asset-packagist недоступен, переключаюсь на установку из lock без внешнего репозитория."
              composer config --unset repositories.0 || true
            fi

            sleep $((attempt * 10))
          done

          echo "Не удалось установить зависимости после нескольких попыток."
          exit 1

      - name: Wait for MySQL
        run: |
          for i in {1..30}; do
            mysqladmin ping -h127.0.0.1 -uroot -proot && exit 0
            sleep 2
          done
          exit 1

      - name: Run syntax lint
        run: vendor/bin/parallel-lint src tests

      - name: Run PHP CS Fixer (dry-run)
        run: vendor/bin/php-cs-fixer fix --dry-run --diff --verbose

      - name: Run Rector (dry-run)
        run: vendor/bin/rector process --dry-run --ansi

      - name: Run tests
        run: vendor/bin/phpunit -c phpunit.xml.dist

      - name: Run PHPStan
        run: vendor/bin/phpstan analyse -c phpstan.neon --no-progress

      - name: Run Psalm taint analysis
        run: vendor/bin/psalm --taint-analysis --no-cache --output-format=console

      - name: Run dependency audit
        run: composer audit --locked
